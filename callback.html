<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>ViralEngine - TikTok Auth</title>
<style>body{font-family:system-ui;max-width:500px;margin:80px auto;padding:0 20px;color:#fff;background:#111;text-align:center}
code{background:#222;padding:8px 16px;border-radius:8px;display:block;margin:20px 0;word-break:break-all;font-size:14px}
.ok{color:#4ade80}.err{color:#f87171}</style>
</head>
<body>
<h1>TikTok Authorization</h1>
<div id="status">Processing...</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
const el = document.getElementById('status');

if (error) {
  el.innerHTML = '<p class="err">Error: ' + error + '</p>';
} else if (code) {
  el.innerHTML = '<p class="ok">Authorization successful!</p><code>Code: ' + code + '</code><p>Sending to ViralEngine...</p>';
  fetch('http://localhost:8000/api/tiktok/callback?code=' + code + '&state=' + (params.get('state') || ''))
    .then(r => r.json())
    .then(d => { el.innerHTML += '<p class="ok">Connected! You can close this tab.</p>'; })
    .catch(e => { el.innerHTML += '<p>Copy the code above and paste it in ViralEngine if auto-connect fails.</p>'; });
} else {
  el.innerHTML = '<p class="err">No authorization code received.</p>';
}
</script>
</body>
</html>
